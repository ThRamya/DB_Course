<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta name="description" content="day5assessment">
            <title>Position</title>
            <link rel="icon" href="image/favicon.png" type="image/png">
            <style>
                .Sticky1{
                    position:sticky;
                    background-color: pink;
                    top:0%;
                }
                .pos_stat{
                    position:static;
                    background-color: yellow;

                }
                .parent_rel{
                    position:relative;
                    background-color: blueviolet;
                    height:300px;
                    width:500px;
                    margin:20px;
                }
                .child_abs{
                    position:absolute;
                    background-color: aqua;
                    color:red;
                    height:20px;
                    width:40px;
                    right:10px;
                    top:10px;


                }
                .fix{
                    position:fixed;
                    bottom:10px;
                    right:10px;
                    background-color: orange;
                    padding:10px;
                }


            </style>
            
        
    </head>
    <body>
        <p class="Sticky1">Hi Girls!</p>
        <div class="pos_stat">
            Hi!! Welcome you all.
        </div>
       <div class="parent_rel">
        <h1>Nature and Peace</h1>
        <div class="child_abs">
           <h1>Beautiful Tree</h1>
        </div>
       </div>
       <div class="fix">fixed box</div>
       <div style="height:1000px; padding: 20px;">Scroll down to see fixed and sticky behavior.</div>
    </body>
</html>
