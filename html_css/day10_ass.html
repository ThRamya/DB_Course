<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,tr,td{
            border: 2px double gray;
        }
        th,td{
            padding: 10%;
            width:150px;
        }
        th{
            background-color: grey;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        form{
            margin: 5%;
            padding: 5%;
            box-shadow: 0px 0px 1px 2px grey;
        }
        .form_container{
            padding:1%;
        }
        .form_container >label{
            min-width:200px;
            display:inline-block;
        }
        .form_container >input{
            min-width: 269px;
            border-radius: 3%;
            padding:1%;
        }
        .gen input{
            min-width: 69px;
        }
        .gen label{
            display: inline-block;
            min-width: 100px;
        }
       
        
    </style>
</head>
<body>
    <table>
        <th>rollno</th>
        <th>name</th>
        <th>age</th>
        <th>degree</th>
        <tr>
            <td>1001</td>
            <td>Ramya</td>
            <td>26</td>
            <td>B.Tech</td>
        </tr>
        <tr>
            <td>1002</td>
            <td>Monisha</td>
            <td>26</td>
            <td>B.Tech</td>
        </tr>
    </table>
    <form>
        <div class="form_container">
            <label for="fname">Firstname:</label><input type="text" name="firstname" id="fname"> 
        </div>
        <div class="form_container">
            <label for="lname">Lastname:</label><input type="text" name="lastname" id="lname">
        </div>
        <div class="form_container">
            <label for="mob">Mobile Number:</label><input type="text" name="number" id="mob">
        </div>
        <div class="form_container">
        <label>Gender:</label>
        <div class="gen">
        <input type="radio" name="gender" id="male"><label for="male">Male</label>      
        <input type="radio" name="gender" id="female"><label for="female">Female</label>
        <input type="radio" name="gender" id="others"><label for="others">Others</label>
        </div>
        </div>
    </form>
    
</body>
</html>
