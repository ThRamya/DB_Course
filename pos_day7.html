<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.position_pro{
   width:300px;
   height:300px;
   background-color: aqua;
   position: static;
   top:0;
   left:0;
}
img{
    width:300px;
}
.fixed_po{
    width:100px;
   height:100px;
   background-color: pink;
   position: fixed;
   top:50px;
   right:150px;

}
.position_sticky{
    width:300px;
   height:300px;
   background-color: yellow;
   position:sticky;
   left:100px;
   bottom:15px;

}
.position_rel{
    width:100px;
   height:100px;
   background-color: red;
   position:relative;
   top:50px;
   left:100px;
   
}
.absolute_rel{
    width:100px;
   height:100px;
   background-color: red;
   position:absolute;
   right:0px;
   bottom:0px;
}
.parent{
    width:300px;
   height:300px;
   background-color: black;
   
}
.g_parent{
    width:600px;
   height:600px;
   background-color: orange;
    position:relative;
}
h4{
    color:white
}

</style>
<body>
    <div class="fixed_po">

    </div>
    <img src="image/act_campus.jpg">
    <div class="position_rel">
<h4>relative</h4>
    </div>
    <div class="position_pro">
     
    </div>
    
    <div>
        <p>Hi, Welcome</p>
        <h1>Ramya</h1>
    </div>
    
    <div class="position_sticky">

    </div>
    <div class="g_parent">
         <h4>grand</h4>
    <div class="parent">
         <h4>parent</h4>
    <div class="absolute_rel">
         <h4>abs_pos</h4>
</div>
    </div>
    </div>
</body>
</html>
