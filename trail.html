<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Input Types Example</title>
</head>
<body>
    <h2>HTML Input Types Example</h2>
    
    <!-- Text Inputs -->
    <label for="text">Text:</label>
    <input type="text" id="text" name="text"><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password"><br><br>

    <label for="submit">Submit:</label>
    <input type="submit" id="submit" value="Submit"><br><br>

    <label for="reset">Reset:</label>
    <input type="reset" id="reset" value="Reset"><br><br>

    <label>Radio Buttons:</label>
    <input type="radio" name="radio" value="Option1"> Option 1
    <input type="radio" name="radio" value="Option2"> Option 2<br><br>

    <label>Checkbox:</label>
    <input type="checkbox" name="checkbox" value="Check1"> Check 1
    <input type="checkbox" name="checkbox" value="Check2"> Check 2<br><br>

    <button>Button</button><br><br>

    <!-- File and Media Inputs -->
    <label for="file">File:</label>
    <input type="file" id="file" name="file"><br><br>

    <label for="image">Image:</label>
    <input type="image" id="image" src="example.png" alt="Example Image"><br><br>

    <label for="color">Color:</label>
    <input type="color" id="color" name="color"><br><br>

    <!-- Date and Time Inputs -->
    <label for="date">Date:</label>
    <input type="date" id="date" name="date"><br><br>

    <label for="datetime-local">Datetime Local:</label>
    <input type="datetime-local" id="datetime-local" name="datetime-local"><br><br>

    <label for="month">Month:</label>
    <input type="month" id="month" name="month"><br><br>

    <!-- Email -->
    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>

    <!-- Number, URL, Week, Search, Tel -->
    <label for="number">Number:</label>
    <input type="number" id="number" name="number"><br><br>

    <label for="url">URL:</label>
    <input type="url" id="url" name="url"><br><br>

    <label for="week">Week:</label>
    <input type="week" id="week" name="week"><br><br>

    <label for="search">Search:</label>
    <input type="search" id="search" name="search"><br><br>

    <label for="tel">Telephone:</label>
    <input type="tel" id="tel" name="tel"><br><br>
</body>
</html>
