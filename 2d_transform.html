<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .orginal img{
            width:200px;
            height: 200px;
            background-color: aqua;
            transition: width 1s,height 2s,background-color 10s;
           transition-timing-function: ease-in;
        }
        .orginal img:hover{
            width:300px; 
            height:300px;
            background-color: red;
            border:5px solid orange;
        }
        .modify_scale{
             width:200px;
            height: 100px;
            background-color: pink;
            position: relative;
            top:200px;
            transform:scale(2,2);/*x=2 times,y=3times*/
         
        }
        .modify_translate{
            width:200px;
            height: 100px;
            background-color: yellow;
            position: fixed;
            top:0px;
            transform:translate(200px, 100px);
        }
        .modify_rotate{
            width:200px;
            height: 100px;
            background-color: yellow;
            position: fixed;
            top:0;
            left:250px;
            transform:rotateX(45deg);
            border-top: 12px solid;
        }

    </style>
</head>
<body>
    <div class="orginal">
        <img src="image/act_campus.jpg" alt="act">
    </div>
    
    <div class="modify_scale"></div>
    <div class="modify_translate"></div>
    <div class="modify_rotate"></div>
    
</body>
</html>
