<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="inputBox">
    <h1 id="result"></h1>
</body>
<script>
    document.getElementById("inputBox").addEventListener("keyup",function(){
        var a=document.getElementById("inputBox").value;
        document.getElementById("result").textContent=a;

    })
</script>
</html>
