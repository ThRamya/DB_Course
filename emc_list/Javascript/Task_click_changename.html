<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="word">Word Change</h1>
    <button id="btn">John</button>
    <button id="btn1">Hari</button>
    <button id="btn2">Praveen</button>
    <script>
            document.getElementById("btn").addEventListener("click",changeWord);
            document.getElementById("btn1").addEventListener("click",changeWord);
            document.getElementById("btn2").addEventListener("click",changeWord);
            
            function changeWord(e){
            var h=document.getElementById("word");
            h.innerText= e.target.textContent;
            } 
          

           
        


    </script>
</body>
</html>
