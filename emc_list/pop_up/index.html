<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .overlay{
            position:absolute;
            background:black;
            width:100%;
            height:100%;
            top:0px;
            left:0px;
            opacity:0.8;
            z-index:1;
            display:none;
        }
        .popupbox{
            position:absolute;
            z-index:2;
            background-color: white;
            color:black;
            width:40%;
            padding:20px;
            border-radius:10px;
            left:30%;
            display:none;
        }

    </style>
</head>
<body>
    <button id="show">Show</button>
    <div class="overlay"></div>
    <div class="popupbox">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ipsa ratione eveniet veritatis sint accusamus omnis quasi asperiores fuga ea! Eligendi quis harum assumenda odit veniam est, asperiores maiores quasi tenetur.</p>
        <button id="del">Close</button>
    </div>
    <script>
        var popupoverlay=document.querySelector(".overlay");
          var popupbox=document.querySelector(".popupbox");
          document.getElementById("show").addEventListener("click",function(){

               popupbox.style.display="block";
               popupoverlay.style.display="block";

          })
          document.getElementById("del").addEventListener("click",function(){

                // popupbox.style.display="none";
                popupbox.remove();

          })
    </script>
</body>
</html>
