<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action ="intro.html" method="post">
        <input type ="text" />
        <input type="submit"/>
        <!--number,alphabet,romanletter,reverse,value,start-->
        <ol type="A">
            <li value="5">one</li> <!--value used in list-->
            <li>two</li>
        </ol>
        <ol start="5">
            <li>one</li>
            <li>two</li>
        </ol>
        <ol reversed>
            <li>one</li>
            <li>two</li>
        </ol>
        <!--unorderlist-->
        <ul>
            <li>one</li>
            <li>two</li>
        </ul>
</form>

</body>
</html>
