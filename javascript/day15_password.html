<!DOCTYPE html>
<html>
<head>
    <title>Password Validation</title>
    <style>
        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>

<h2>Password Validation</h2>

<input type="password" id="pswd" placeholder="Enter password">
<br><br>

<!-- Error message -->
<p id="mainError" class="error"></p>

<h4>Password must contain:</h4>

<!-- Only content (no id, no class initially) -->
<p>Atleast 8 characters</p>
<p>One Uppercase letter</p>
<p>One Lowercase letter</p>
<p>One number</p>
<p>One special character</p>

<script>

// Select all rule <p> elements (skip mainError)
let rules = document.querySelectorAll("p");

// Add id and default class dynamically
rules[1].setAttribute("id", "length");
rules[1].setAttribute("class", "error");

rules[2].setAttribute("id", "upper");
rules[2].setAttribute("class", "error");

rules[3].setAttribute("id", "lower");
rules[3].setAttribute("class", "error");

rules[4].setAttribute("id", "number");
rules[4].setAttribute("class", "error");

rules[5].setAttribute("id", "special");
rules[5].setAttribute("class", "error");


// Password validation
document.getElementById("pswd").addEventListener("keyup", function () {

    let password = this.value;
    let mainError = document.getElementById("mainError");

    // LENGTH CHECK
    if (password.length >= 8) {
        document.getElementById("length")
            .setAttribute("class", "success");
    } else {
        document.getElementById("length")
            .setAttribute("class", "error");
        mainError.textContent = "Password must be at least 8 characters!";
    }

    // UPPERCASE CHECK
    if (/[A-Z]/.test(password)) {
        document.getElementById("upper")
            .setAttribute("class", "success");
    } else {
        document.getElementById("upper")
            .setAttribute("class", "error");
    }

    // LOWERCASE CHECK
    if (/[a-z]/.test(password)) {
        document.getElementById("lower")
            .setAttribute("class", "success");
    } else {
        document.getElementById("lower")
            .setAttribute("class", "error");
    }

    // NUMBER CHECK
    if (/[0-9]/.test(password)) {
        document.getElementById("number")
            .setAttribute("class", "success");
    } else {
        document.getElementById("number")
            .setAttribute("class", "error");
    }

    // SPECIAL CHARACTER CHECK
    if (/[@$!%*?&]/.test(password)) {
        document.getElementById("special")
            .setAttribute("class", "success");
    } else {
        document.getElementById("special")
            .setAttribute("class", "error");
    }

    // If everything is correct, clear main error
    if (
        password.length >= 8 &&
        /[A-Z]/.test(password) &&
        /[a-z]/.test(password) &&
        /[0-9]/.test(password) &&
        /[@$!%*?&]/.test(password)
    ) {
        mainError.textContent = "Password is strong!";
        mainError.setAttribute("class", "success");
    }

});

</script>

</body>
</html>
