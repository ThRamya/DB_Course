<!doctype html> <!--html version--> <!--if no<!doctype html> then it is in quirks mode(old version like internetexplorer here layout may break not work in standard mode) -->
<html lang="en"> <!--html is the root(main tag) element and set a language-->
    <head><!--inside head we can add meta,title,link,style,script-->
        <meta charset="utf-8"><!--Meta is information about page, Meta tags provide metadata (information about the webpage). here Uniform Transformation Format UTF-8 encodes Unicode code points into bytes, and those bytes are stored in binary form.-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Viewport controls page layout on different devices.
         width=device-width sets the page width to match the device screen.
         initial-scale=1.0 sets the default zoom level.
         Helps make the website responsive on mobile and laptop screens. -->
         <meta name="description" content="Practicing html">
<!-- Meta description is not displayed on the webpage.
     It is used by search engines to understand the page content
     and may appear in search results. -->
