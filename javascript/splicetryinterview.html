      let arr = [1,2,3,4];

// Old splice
let removed = arr.splice(1,2,9,8);
console.log(arr);     // [1,9,8,4]  (changed!)
console.log(removed); // [2,3]      (deleted elements)

// New toSpliced

//reverse vs toReversed
let arr2 = [1,2,3];
// Old reverse (mutable)
let reversed = arr2.reverse();
console.log("arr2 after reverse:", arr2);    // [3,2,1]  (changed)
console.log("Reversed array:", reversed);    // [3,2,1]  (same array)

// Reset arr2 for immutable example
arr2 = [1,2,3];

// New toReversed (immutable)
let newArr2 = arr2.toReversed();
console.log("arr2 after toReversed:", arr2); // [1,2,3]  (unchanged)
console.log("New reversed array:", newArr2); // [3,2,1]

//sort/toSorted
arr3=[3,1,2];
arr3.sort();  
console.log("arr3 after sort():", arr3);    // [1,2,3]  (original changed)

// Reset arr3 for immutable example
arr3 = [3,1,2];

// --- New toSorted (immutable) ---
let newArr3 = arr3.toSorted();
console.log("arr3 after toSorted():", arr3); // [3,1,2]  (original unchanged)
console.log("New sorted array:", newArr3);   // [1,2,3]
