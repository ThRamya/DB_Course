<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        fetch("https://api.github.com/users/anuradha9712")

        console.log(id);

        console.log(name); 
       
        document.querySelector("#fullname").innerText=name;
