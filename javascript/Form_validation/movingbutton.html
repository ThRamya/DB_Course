<!DOCTYPE html>
<html>
<head>
    <title>Running Button</title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            position: relative;
        }

        #runBtn {
            position: absolute;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="runBtn">Click Me 😄</button>

    <script>
        const btn = document.getElementById("runBtn");

        btn.addEventListener("mouseover", function () {
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);

            btn.style.left = x + "px";
            btn.style.top = y + "px";
        });
    </script>

</body>
</html>
