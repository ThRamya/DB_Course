    <script>
        //async is a keyword used before a function.
        //It makes the function always return a Promise.
        async function test1() {
            return "Hello";
        }
        console.log(test1());//Promise {<fulfilled>: 'Hello'}

        //await is used to wait for a Promise to complete.
        //It pauses the function until Promise resolves.
        // step1 function returns a Promise
        //ex1:
        function step1() {
            return new Promise(function (resolve, reject) {
                console.log("step1 executed");
                resolve(10);
            });
        }


        // async function run
        async function run() {

            console.log("run started");

            // await step1
            let result = await step1();
            console.log("after step1:", result);

            // chaining logic manually
            result = result + 10;
            console.log("after adding 10:", result);

            result = result + 10;
            console.log("after adding another 10:", result);

            console.log("final result:", result);


        }

        // call run
        run();
