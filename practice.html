<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Bar using UL LI</title>

<style>
/* RESET */
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* MENU BAR */
.navbar {
    background-color: #222;
    position: sticky;
    top: 0;
}

/* REMOVE BULLETS */
.navbar ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    display: flex;   /* MAKES TABS HORIZONTAL */
}

/* LIST ITEMS */
.navbar li {
    padding: 15px 20px;
}

/* LINKS */
.navbar a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* HOVER EFFECT */
.navbar li:hover {
    background-color: #444;
}

/* CONTENT */
.content {
    padding: 20px;
}
</style>
</head>

<body>

<!-- MENU BAR -->
<nav class="navbar">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- PAGE CONTENT -->
<div class="content">
    <h1>Welcome to My Website</h1>
    <p>This menu bar is built using UL and LI like real webpages.</p>
</div>

<div style="height:1000px"></div>

</body>
</html>
