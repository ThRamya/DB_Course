<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer_layer {
            width: 500px;
            height: 400px;
            border: 3px solid red;
            background-color: #d8e9f3;
        }

        .cat_holder {
            height: 75px;
            width: 100px;
            background-image: url("cat1.jpeg");
            animation-name: ball_bounce;
            animation-duration: 2s;
            animation-iteration-count: infinite;

        }

        @keyframes ball_bounce {
            0% {
                background-image: url("cat1.jpeg");
                ;
                position: relative;
                left: 0px
            }

            50% {
                background-image: url("cat2.jpeg");
                ;
                position: relative;
                left: 50px
            }

            100% {
                background-image: url("cat3.jpeg");
                ;
                position: relative;
                left: 100px
            }
        }
    </style>
</head>

<body><!-- 
    <div class="outer_layer">
        <div class="ball_holder">

        </div>
    </div> -->
    <div class="outer_layer">
        <div class="cat_holder">

        </div>
    </div>

</body>

</html>
